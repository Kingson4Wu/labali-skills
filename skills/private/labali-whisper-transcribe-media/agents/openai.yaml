version: 1
interface:
  display_name: Labali Whisper Transcribe Media
  description: Transcribe local audio or video files to text with Whisper; for video, extracts audio with ffmpeg first. Supports optional language control. Use when you need speech-to-text, audio transcription, or voice-to-text from local media files.
  default_prompt: Transcribe this media file to text with Whisper. If it is video, extract audio first, then run transcription and wait for completion.

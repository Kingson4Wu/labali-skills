name: labali-video-ocr-timeline-transcript
description: Extract time-indexed text from video frames with ffmpeg + macOS Vision OCR and prepare LLM merge chunks.
executor: scripts/run.ts
inputs:
  video_path:
    type: string
    required: true
    description: Local input video path.
  output_dir:
    type: string
    required: false
    description: Optional output directory. Default <video_stem>_ocr_timeline beside source video.
  adaptive_mode:
    type: string
    required: false
    description: Frame extraction mode smart|hybrid|fixed. Default smart.
  fps:
    type: number
    required: false
    description: Fixed sampling fps (fixed mode) or fallback base for hybrid/smart. Default 0.5.
  scene:
    type: number
    required: false
    description: Scene-change threshold for select filter. Default 0.3.
  max_gap:
    type: number
    required: false
    description: Maximum seconds between sampled frames in hybrid/smart mode. Default auto.
  languages:
    type: string
    required: false
    description: Vision OCR languages, comma-separated. Default zh-Hans,zh-Hant,en.
  recognition_level:
    type: string
    required: false
    description: Vision recognition level, accurate or fast. Default accurate.
  chunk_size:
    type: number
    required: false
    description: Number of OCR rows per LLM chunk. Default 80.
  chunk_overlap:
    type: number
    required: false
    description: Overlap rows between chunks. Default 10.
  merge_similarity:
    type: number
    required: false
    description: Similarity threshold for duplicate OCR merge, in (0,1]. Default 0.9.
  merge_max_gap:
    type: number
    required: false
    description: Maximum seconds between two OCR rows to allow merge. Default 2.0.
  debug:
    type: boolean
    required: false
    description: Keep intermediate files (frames/raw/chunks). Default false (auto-cleanup intermediates).
  image_format:
    type: string
    required: false
    description: Frame image format for extraction, jpg/png/webp. Default jpg.
  cleanup_frames:
    type: boolean
    required: false
    description: Delete extracted frame images after OCR.

name: labali-weibo-download-user-posts
description: Browser-only automation skill to export a Weibo user's timeline posts and media into a local folder.
executor: scripts/executor.ts
inputs:
  user_url:
    type: string
    required: false
    description: Full Weibo user profile URL. If omitted, runner prompts interactively.
  output_dir:
    type: string
    required: false
    default: ./downloads/weibo-user
    description: Target local directory for exported files.
  profile_dir:
    type: string
    required: false
    default: ~/.chrome-labali-no-proxy
    description: Chrome user-data-dir used by unified open -na Google Chrome startup command.
  cdp_port:
    type: string
    required: false
    default: "9223"
    description: Chrome DevTools remote-debugging port.
  proxy_mode:
    type: string
    required: false
    default: none
    description: Chrome proxy mode for auto-launched Chrome. Use none to pass --no-proxy-server, system to inherit the system proxy, or custom with proxy_server.
  proxy_server:
    type: string
    required: false
    description: Proxy server passed to Chrome as --proxy-server when proxy_mode=custom.
  timeout_ms:
    type: string
    required: false
    default: "180000"
    description: Navigation, extraction, and media download timeout in milliseconds.
  overwrite:
    type: boolean
    required: false
    default: false
    description: Overwrite existing files with same generated names when true.
  max_posts:
    type: string
    required: false
    default: "0"
    description: Maximum posts to export; 0 means no explicit cap.
  include_videos:
    type: boolean
    required: false
    default: true
    description: Download videos when present.

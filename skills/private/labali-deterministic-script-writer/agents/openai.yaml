version: 1
interface:
  display_name: Labali Deterministic Script Writer
  description: Turn a user task into a deterministic script specification for direct, repeatable execution without runtime reasoning. Use when freezing a workflow, creating a reusable automation template, or converting a repeated task into a fixed blueprint.
  default_prompt: Freeze my task into an executable deterministic script spec so next time it can run directly without repeated reasoning.

name: labali-image-desensitize
description: Metadata-only image sanitization via physical re-encode and metadata stripping, then run post-sanitize hidden metadata sensitive-info scan and in-agent model judgment from metadata payload, with optional strict non-zero gate. Does not inspect or redact visible pixel content.
executor: scripts/run.ts
inputs:
  input_image:
    type: string
    required: true
    description: Source image file path.
  output_image:
    type: string
    required: true
    description: Output sanitized image file path.

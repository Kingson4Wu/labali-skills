name: labali-image-desensitize
description: Desensitize local images by physical re-encode and metadata stripping, then run post-sanitize hidden metadata sensitive-info scan and in-agent model judgment from metadata payload, with optional strict non-zero gate.
executor: scripts/run.ts
inputs:
  input_image:
    type: string
    required: true
    description: Source image file path.
  output_image:
    type: string
    required: true
    description: Output sanitized image file path.

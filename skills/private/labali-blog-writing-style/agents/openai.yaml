interface:
  display_name: Labali Blog Writing Style
  description: Draft or revise personal blog posts in Kingson Wu's established voice — covering technical essays, workplace reflections, and reading notes. Use when drafting a new article, revising an existing post, or making AI-written content sound like the author's earlier blog voice.
  default_prompt: Write or revise a blog post in my established article voice. Preserve my judgment style and core meaning, but improve structure, section hierarchy, transitions, and overall readability.

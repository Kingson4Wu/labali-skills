name: labali-xiaohongshu-export-user-post-links
description: Browser-only automation skill to extract all post links from a Xiaohongshu user profile and export to a local file.
executor: scripts/executor.ts
inputs:
  profile_url:
    type: string
    required: false
    description: Xiaohongshu profile URL (for example /user/profile/<user_id>?xsec_token=...)
  output_path:
    type: string
    required: false
    default: ./downloads/xhs-post-links.txt
    description: Output file path or output directory. If a directory is provided, script generates a file name.
  include_token:
    type: boolean
    required: false
    default: true
    description: Include xsec_token and xsec_source in exported explore URLs.
  include_publish_time:
    type: boolean
    required: false
    default: false
    description: Prefix each exported line with publish time and a tab separator.
  exclude_sticky:
    type: boolean
    required: false
    default: false
    description: Exclude pinned posts from the exported result set.
  limit:
    type: string
    required: false
    description: Stop after collecting enough candidates for the latest N posts and export only N results.
  profile_dir:
    type: string
    required: false
    default: ~/.chrome-labali-no-proxy
    description: Chrome user-data-dir used by unified CDP startup.
  cdp_port:
    type: string
    required: false
    default: "9223"
    description: Chrome DevTools remote-debugging port.
  proxy_mode:
    type: string
    required: false
    default: none
    description: Chrome proxy mode for auto-launched Chrome. Use none to pass --no-proxy-server, system to inherit the system proxy, or custom with proxy_server.
  proxy_server:
    type: string
    required: false
    description: Proxy server passed to Chrome as --proxy-server when proxy_mode=custom.
  timeout_ms:
    type: string
    required: false
    default: "90000"
    description: Navigation and extraction timeout in milliseconds.
  max_scroll_rounds:
    type: string
    required: false
    default: "80"
    description: Maximum scroll rounds for pagination.

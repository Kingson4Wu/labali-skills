name: labali-git-auto-commit-rewrite
description: Generate a conventional commit message from current git changes, stage all files, commit locally, and normalize via clean_commit.sh. Use when users want to commit, stage and commit, auto-commit, or generate a commit message for current changes. Trigger phrases: "commit changes", "git commit", "commit all", "commit message", "conventional commit".
inputs:
  focus:
    type: string
    required: false
    description: Optional scope emphasis to guide commit message generation (e.g. "focus on config changes").

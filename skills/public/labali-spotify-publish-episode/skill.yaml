name: labali-spotify-publish-episode
description: Browser-only semantic automation skill for publishing podcast episodes on Spotify for Creators.
executor: scripts/auto-executor.ts
inputs:
  # Episode metadata (required)
  audio_file:
    type: string
    required: true
    description: Absolute or workspace-relative path to the episode audio file.
  title:
    type: string
    required: true
    description: Episode title shown in Spotify.
  description:
    type: string
    required: true
    description: Episode description shown in Spotify.

  # Show targeting (provide one of: show_id, show_home_url, show_name)
  show_id:
    type: string
    required: false
    description: Spotify show id. Preferred method for show targeting.
  show_home_url:
    type: string
    required: false
    description: Direct show home page URL. Derived from show_id if omitted.
  show_name:
    type: string
    required: false
    description: Show name for selector-based navigation when URL unavailable.

  # Episode metadata (optional)
  season_number:
    type: string
    required: false
    description: Season number (positive integer).
  episode_number:
    type: string
    required: false
    description: Episode number (positive integer).
  cover_image:
    type: string
    required: false
    description: Cover image path.

  # Publish control (optional)
  publish_at:
    type: string
    required: false
    description: ISO-8601 datetime for scheduled publication. Omit for immediate publish.
  confirm_publish:
    type: boolean
    required: false
    default: true
    description: Publish guard. Set false to stop before final publish action.

  # Runtime configuration (optional)
  disable_deterministic_cache:
    type: boolean
    required: false
    default: false
    description: Skip deterministic cache and run policy executor directly.
  profile_dir:
    type: string
    required: false
    default: ~/.chrome-labali
    description: Chrome user data dir for login-session reuse.
  cdp_port:
    type: string
    required: false
    default: "9222"
    description: Chrome DevTools Protocol port.
  proxy_mode:
    type: string
    required: false
    default: system
    description: Chrome proxy mode for auto-launched Chrome. Use none to pass --no-proxy-server, system to inherit the system proxy, or custom with proxy_server.
  proxy_server:
    type: string
    required: false
    description: Proxy server passed to Chrome as --proxy-server when proxy_mode=custom.
  headed:
    type: boolean
    required: false
    default: true
    description: Run browser in headed mode for manual login and visual debugging.

name: labali-spotify-publish-episode
description: Browser-only semantic automation skill for publishing podcast episodes on Spotify for Creators.
executor: scripts/auto-executor.ts
inputs:
  audio_file:
    type: string
    required: true
    description: Absolute or workspace-relative path to the episode audio file.
  title:
    type: string
    required: true
    description: Episode title shown in Spotify.
  description:
    type: string
    required: true
    description: Episode description shown in Spotify.
  show_id:
    type: string
    required: true
    description: Spotify show id used to build direct creators URL and open the target show without name search.
  show_name:
    type: string
    required: false
    description: Optional show name fallback for selector-based navigation when direct URL is unavailable.
  season_number:
    type: string
    required: false
    description: Optional season number to fill in episode metadata (positive integer).
  episode_number:
    type: string
    required: false
    description: Optional episode number to fill in episode metadata (positive integer).
  disable_deterministic_cache:
    type: boolean
    required: false
    default: false
    description: Set true to skip deterministic trajectory cache and run policy executor directly.
  cover_image:
    type: string
    required: false
    description: Optional cover image path for this episode.
  publish_at:
    type: string
    required: false
    description: Optional ISO-8601 datetime to schedule publication. If omitted, publish immediately.
  show_home_url:
    type: string
    required: false
    description: Optional direct show home page URL. If omitted, executor derives it from show_id.
  confirm_publish:
    type: boolean
    required: false
    default: true
    description: Optional publish guard. Defaults to true for direct publish; set false to stop before final publish action.
  profile_dir:
    type: string
    required: false
    default: ~/.chrome-spotify
    description: Chrome user data dir for login-session reuse when auto-launching local Chrome with remote debugging.
  cdp_port:
    type: string
    required: false
    default: "9222"
    description: Chrome DevTools Protocol port. Default 9222; executor first reuses it and auto-launches Chrome if absent.
  headed:
    type: boolean
    required: false
    default: true
    description: Run browser in headed mode for manual login and visual debugging.

name: validate-skills

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate skills
        run: python3 -B scripts/validate_all.py
      - name: Check for Chinese characters
        run: python3 -B scripts/check_chinese.py
